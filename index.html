<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KST RГјzgar Casino</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --dark: #0b0b0b; --card: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; }
        .active { display: flex; }
        .header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); font-weight: bold; }
        
        /* Lobi */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; overflow-y: auto; }
        .game-card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #333; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); border-color: var(--gold); }
        .game-card i { font-size: 35px; color: var(--gold); display: block; margin-bottom: 8px; }

        /* Oyun AlanlarДұ */
        .game-container { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .display-box { font-size: 40px; background: #222; padding: 25px; border-radius: 15px; border: 2px solid var(--gold); margin-bottom: 20px; min-width: 200px; }
        .btn-action { background: var(--gold); color: black; border: none; padding: 15px 40px; border-radius: 10px; font-weight: bold; font-size: 18px; width: 80%; }
        .btn-home { margin-top: 25px; color: #888; background: none; border: none; text-decoration: underline; font-size: 14px; }
        
        /* Kart/Okey GГ¶rseli */
        .card-view { font-size: 60px; color: white; }
    </style>
</head>
<body>

    <div id="menu" class="screen active">
        <div class="header">рҹҺ° KST RГңZGAR LOBД°</div>
        <div class="game-grid">
            <div class="game-card" onclick="openGame('okey')"><i class="fas fa-layer-group"></i>OKEY 101</div>
            <div class="game-card" onclick="openGame('poker')"><i class="fas fa-spade"></i>Д°SKAMBД°L</div>
            <div class="game-card" onclick="openGame('aviator')"><i class="fas fa-paper-plane"></i>AVIATOR</div>
            <div class="game-card" onclick="openGame('slot')"><i class="fas fa-random"></i>SLOT</div>
            <div class="game-card" onclick="openGame('zar')"><i class="fas fa-dice"></i>ZAR ATMA</div>
            <div class="game-card" onclick="openGame('mayin')"><i class="fas fa-bomb"></i>MAYIN</div>
        </div>
    </div>

    <div id="game-okey" class="screen">
        <div class="header">рҹҖ„ OKEY 101 MASASI</div>
        <div class="game-container">
            <div class="display-box" id="okey-res">рҹҖ„ Bekleniyor...</div>
            <button class="btn-action" onclick="playOkey()">TAЕһ ГҮEK</button>
            <button class="btn-home" onclick="goMenu()">в¬… Lobiye DГ¶n</button>
        </div>
    </div>

    <div id="game-poker" class="screen">
        <div class="header">вҷ пёҸ Д°SKAMBД°L / POKER</div>
        <div class="game-container">
            <div class="display-box card-view" id="card-res">рҹғҸ</div>
            <button class="btn-action" onclick="playCards()">KART ГҮEK</button>
            <button class="btn-home" onclick="goMenu()">в¬… Lobiye DГ¶n</button>
        </div>
    </div>

    <div id="game-aviator" class="screen">
        <div class="header">рҹҡҖ 3D AVIATOR</div>
        <div class="game-container">
            <div class="display-box" id="av-res" style="color:red; font-weight:bold;">1.00x</div>
            <button class="btn-action" id="av-btn" onclick="playAviator()">BAЕһLAT</button>
            <button class="btn-home" onclick="goMenu()">в¬… Lobiye DГ¶n</button>
        </div>
    </div>

    <div id="game-zar" class="screen">
        <div class="header">рҹҺІ ZAR ATMA</div>
        <div class="game-container">
            <div class="display-box" id="zar-res">рҹҺІ ?</div>
            <button class="btn-action" onclick="playZar()">ZAR AT</button>
            <button class="btn-home" onclick="goMenu()">в¬… Lobiye DГ¶n</button>
        </div>
    </div>

    <div id="game-slot" class="screen">
        <div class="header">рҹҺ° SLOT VEGAS</div>
        <div class="game-container">
            <div class="display-box" id="slot-res">рҹҚ’|рҹҚӢ|рҹ””</div>
            <button class="btn-action" onclick="playSlot()">ГҮEVД°R</button>
            <button class="btn-home" onclick="goMenu()">в¬… Lobiye DГ¶n</button>
        </div>
    </div>

    <div id="game-mayin" class="screen">
        <div class="header">рҹ’Ј MAYIN TARLASI</div>
        <div class="game-container">
            <div class="display-box" id="bomb-res">рҹҺҒ</div>
            <button class="btn-action" onclick="playMayin()">KUTU AГҮ</button>
            <button class="btn-home" onclick="goMenu()">в¬… Lobiye DГ¶n</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function openGame(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('game-' + id).classList.add('active');
        }

        function goMenu() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('menu').classList.add('active');
        }

        // OKEY: Rastgele taЕҹ ve renk
        function playOkey() {
            const renkler = ['KДұrmДұzДұ', 'Mavi', 'Siyah', 'SarДұ'];
            const sayi = Math.floor(Math.random() * 13) + 1;
            const renk = renkler[Math.floor(Math.random() * 4)];
            document.getElementById('okey-res').innerText = renk + " " + sayi;
        }

        // Д°SKAMBД°L: Rastgele kart sembolГј
        function playCards() {
            const cards = ['вҷ пёҸ', 'вҷҘпёҸ', 'вҷЈпёҸ', 'вҷҰпёҸ'];
            const types = ['A', 'K', 'Q', 'J', '10'];
            const res = cards[Math.floor(Math.random()*4)] + types[Math.floor(Math.random()*5)];
            document.getElementById('card-res').innerText = res;
        }

        // AVIATOR: KatlayДұcДұ simГјlasyonu
        function playAviator() {
            let mult = 1.00;
            const btn = document.getElementById('av-btn');
            btn.disabled = True;
            let interval = setInterval(() => {
                mult += 0.05;
                document.getElementById('av-res').innerText = mult.toFixed(2) + "x";
                if(Math.random() < 0.1) {
                    clearInterval(interval);
                    tg.showAlert("UГ§ak KaГ§tДұ! KatlayДұcДұ: " + mult.toFixed(2));
                    btn.disabled = false;
                }
            }, 100);
        }

        // ZAR
        function playZar() {
            document.getElementById('zar-res').innerText = "рҹҺІ " + (Math.floor(Math.random() * 6) + 1);
        }

        // SLOT
        function playSlot() {
            const s = ['рҹҚ’', 'рҹ’Һ', 'рҹҚӢ', 'рҹ””', '7пёҸвғЈ'];
            const r = () => s[Math.floor(Math.random()*s.length)];
            document.getElementById('slot-res').innerText = `${r()}|${r()}|${r()}`;
        }

        // MAYIN
        function playMayin() {
            const res = Math.random() > 0.3 ? "рҹ’Һ KAZANDIN" : "рҹ’Ј BOMBA!";
            document.getElementById('bomb-res').innerText = res;
        }
    </script>
</body>
</html>
