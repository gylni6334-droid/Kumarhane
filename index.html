<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KST Rüzgar Kumar Masası</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #ffd700; --dark: #0b0b0b; --card: #1a1a1a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: var(--card); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        .balance-box { background: #222; padding: 10px; border-radius: 10px; margin: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px; }
        .game-card { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #222; transition: 0.2s; position: relative; }
        .game-card:active { transform: scale(0.95); border-color: var(--gold); }
        .game-card i { font-size: 35px; color: var(--gold); margin-bottom: 10px; display: block; }
        .game-card span { font-weight: bold; font-size: 14px; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid #222; }
        .tab-item { color: #888; font-size: 11px; text-align: center; }
        .tab-item.active { color: var(--gold); }
        .tab-item i { font-size: 20px; display: block; }
        /* 3D Efekt */
        .glow { box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
    </style>
</head>
<body>
    <div class="header">🎰 KST RÜZGAR KUMAR MASASI</div>
    
    <div class="balance-box">
        <span>👤 <b id="u_name">Oyuncu</b></span>
        <span style="color:var(--gold)">💰 <b id="u_bal">1.000</b></span>
    </div>

    <div class="game-grid">
        <div class="game-card glow" onclick="play('Okey')"><i class="fas fa-layer-group"></i><span>Okey 101</span></div>
        <div class="game-card glow" onclick="play('İskambil')"><i class="fas fa-spade"></i><span>İskambil (Poker)</span></div>
        <div class="game-card glow" onclick="play('Aviator')"><i class="fas fa-paper-plane"></i><span>3D Aviator</span></div>
        <div class="game-card glow" onclick="play('Slot')"><i class="fas fa-reorder"></i><span>Vegas Slot</span></div>
        <div class="game-card glow" onclick="play('Zar')"><i class="fas fa-dice"></i><span>Zar Atma</span></div>
        <div class="game-card glow" onclick="play('Mayın')"><i class="fas fa-bomb"></i><span>Mayın Tarlası</span></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active"><i class="fas fa-home"></i>Ev</div>
        <div class="tab-item" onclick="alert('Sıralama Yakında!')"><i class="fas fa-trophy"></i>Sıralama</div>
        <div class="tab-item" onclick="alert('3D Çark Yükleniyor...')"><i class="fas fa-gift"></i>Çark</div>
        <div class="tab-item" onclick="Telegram.WebApp.close()"><i class="fas fa-sign-out-alt"></i>Çıkış</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('u_name').innerText = tg.initDataUnsafe.user?.first_name || "Oyuncu";
        
        function play(game) {
            tg.showPopup({
                title: 'Oyun Başlıyor',
                message: game + ' masasına hoş geldin! Bol şans.',
                buttons: [{type: 'ok', text: 'Başla'}]
            });
        }
    </script>
</body>
</html>
