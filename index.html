<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: gold; text-align: center; }
        #btn { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
               padding: 15px; background: gold; border: none; font-weight: bold; border-radius: 10px;}
    </style>
</head>
<body>
    <div style="position:absolute; width:100%;"><h2>KST 3D CASINO</h2></div>
    <button id="btn" onclick="kazan()">PARAYI ÇEK (2.5x)</button>

    <script>
        // Basit 3D Sahne
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 3D Altın Küp (Slot/Aviator niyetine)
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshBasicMaterial({ color: 0xffd700, wireframe: true });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);
        camera.position.z = 3;

        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.02; cube.rotation.y += 0.02;
            renderer.render(scene, camera);
        }
        animate();

        function kazan() {
            alert("TEBRİKLER! 2.5x Kazandın.");
            window.Telegram.WebApp.close(); // Oyunu kapatıp bota döner
        }
    </script>
</body>
</html>
